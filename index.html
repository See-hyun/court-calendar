<style>
:root {
  --ink: #1a1a2e; --ink-light: #2d2d4e; --gold: #c9a84c; --gold-light: #e8c97a;
  --red: #c0392b; --paper: #faf8f3; --paper-dark: #f0ece0;
  --border: #d4c9a8; --border-dark: #b8a87a; --muted: #7a7565; --white: #ffffff;
  --shadow: rgba(26,26,46,0.12); --today-border: #c0392b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--ink); min-height: 100vh; color: var(--ink); }
.app-wrapper { display: flex; flex-direction: column; min-height: 100vh; background: linear-gradient(160deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%); }
.app-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 28px; background: rgba(255,255,255,0.04); border-bottom: 1px solid rgba(201,168,76,0.3); backdrop-filter: blur(8px); flex-wrap: wrap; gap: 6px; }
.app-logo { font-family: 'Noto Serif KR', serif; font-size: 1.25rem; font-weight: 700; color: var(--gold); letter-spacing: 0.05em; }
.app-logo span { color: rgba(255,255,255,0.7); font-weight: 300; font-size: 0.85rem; margin-left: 10px; }
.header-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.btn-add { background: var(--gold); color: var(--ink); border: none; padding: 7px 16px; border-radius: 4px; font-family: 'Noto Sans KR', sans-serif; font-size: 0.82rem; font-weight: 700; cursor: pointer; transition: background 0.2s; }
.btn-add:hover { background: var(--gold-light); }
.main-area { display: flex; flex: 1; gap: 0; padding: 20px 20px 0 20px; min-height: 0; }
.calendar-panel { flex: 1; display: flex; flex-direction: column; background: var(--paper); border-radius: 8px 0 0 0; overflow: hidden; box-shadow: 0 8px 32px var(--shadow); }
.cal-header { background: var(--ink); padding: 14px 20px 12px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid var(--gold); }
.cal-title { font-family: 'Noto Serif KR', serif; font-size: 1.45rem; font-weight: 700; color: var(--gold); cursor: pointer; user-select: none; display: flex; align-items: center; gap: 8px; transition: color 0.2s; }
.cal-title:hover { color: var(--gold-light); }
.cal-nav { display: flex; gap: 6px; }
.cal-nav-btn { background: rgba(201,168,76,0.15); border: 1px solid rgba(201,168,76,0.4); color: var(--gold); width: 32px; height: 32px; border-radius: 4px; font-size: 1rem; cursor: pointer; transition: background 0.2s; display: flex; align-items: center; justify-content: center; }
.cal-nav-btn:hover { background: rgba(201,168,76,0.3); }
.cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); background: var(--ink-light); }
.cal-weekday { text-align: center; padding: 7px 0; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; color: rgba(255,255,255,0.6); }
.cal-weekday:first-child { color: #e57373; }
.cal-weekday:last-child { color: #7ba7d4; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); flex: 1; border-left: 1px solid var(--border); border-top: 1px solid var(--border); background: var(--paper); }
.cal-cell { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); min-height: 100px; padding: 5px; position: relative; background: var(--paper); transition: background 0.15s; cursor: pointer; }
.cal-cell:hover { background: #f5f0e4; }
.cal-cell.other-month { background: #f7f4ed; opacity: 0.65; }
.cal-cell.today { outline: 2.5px solid var(--today-border); outline-offset: -2.5px; background: #fff5f5; z-index: 1; }
.cal-cell.selected { background: #eef3fb; outline: 2px solid #4a7bc4; outline-offset: -2px; }
.day-num { font-size: 0.78rem; font-weight: 700; color: var(--ink); margin-bottom: 3px; display: inline-block; min-width: 20px; text-align: center; }
.cal-cell.today .day-num { background: var(--today-border); color: white; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; }
.cal-cell.other-month .day-num { color: var(--muted); }
.cal-cell[data-dow="0"] .day-num { color: #c0392b; }
.cal-cell[data-dow="6"] .day-num { color: #2980b9; }
.cell-events { display: flex; flex-direction: column; gap: 2px; margin-top: 2px; }
.cell-event { font-size: 0.67rem; padding: 1px 4px; border-radius: 3px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-left: 2px solid var(--gold); background: rgba(201,168,76,0.12); color: var(--ink); transition: background 0.15s; line-height: 1.5; }
.cell-event:hover { background: rgba(201,168,76,0.28); }
.cell-event.type-변론 { border-left-color: #c0392b; background: rgba(192,57,43,0.08); }
.cell-event.type-조정 { border-left-color: #2980b9; background: rgba(41,128,185,0.08); }
.cell-event.type-선고 { border-left-color: #8e44ad; background: rgba(142,68,173,0.08); }
.cell-event.type-기타 { border-left-color: #27ae60; background: rgba(39,174,96,0.08); }
.cell-event.past { border-left-color: #aaa !important; background: rgba(150,150,150,0.08) !important; color: #999 !important; text-decoration: line-through; }
.cal-cell.past-day { background: #f4f4f0 !important; }
.cal-cell.past-day .day-num { color: #bbb !important; }
.cell-more { font-size: 0.62rem; color: var(--muted); padding: 0 3px; cursor: pointer; }
.detail-panel { width: 300px; background: var(--paper-dark); border-left: 1px solid var(--border); border-radius: 0 8px 0 0; display: flex; flex-direction: column; overflow: hidden; }
.detail-header { background: var(--ink-light); padding: 10px 16px; border-bottom: 2px solid var(--gold); display: flex; align-items: center; justify-content: space-between; }
.detail-title { font-family: 'Noto Serif KR', serif; color: var(--gold); font-size: 0.92rem; font-weight: 700; }
.detail-date-label { font-size: 0.72rem; color: rgba(255,255,255,0.5); }
.detail-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--paper); }
.detail-tab { flex: 1; padding: 8px 0; text-align: center; font-size: 0.76rem; font-weight: 700; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; transition: all 0.2s; }
.detail-tab.active { color: var(--ink); border-bottom-color: var(--gold); }
.detail-tab:hover { background: var(--paper-dark); }
.detail-body { flex: 1; overflow-y: auto; padding: 14px; }
.detail-body::-webkit-scrollbar { width: 4px; }
.detail-body::-webkit-scrollbar-thumb { background: var(--border-dark); border-radius: 2px; }
.form-group { margin-bottom: 10px; }
.form-label { display: block; font-size: 0.71rem; font-weight: 700; color: var(--muted); margin-bottom: 4px; letter-spacing: 0.05em; }
.form-control { width: 100%; padding: 6px 9px; border: 1px solid var(--border); border-radius: 4px; background: var(--white); font-family: 'Noto Sans KR', sans-serif; font-size: 0.78rem; color: var(--ink); transition: border 0.2s; }
.form-control:focus { outline: none; border-color: var(--gold); }
select.form-control { cursor: pointer; }
textarea.form-control { resize: vertical; min-height: 54px; }
.detail-actions { padding: 10px 14px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
.btn-save { flex: 1; background: var(--gold); color: var(--ink); border: none; padding: 8px; border-radius: 4px; font-family: 'Noto Sans KR', sans-serif; font-size: 0.8rem; font-weight: 700; cursor: pointer; }
.btn-save:hover { background: var(--gold-light); }
.btn-delete { background: rgba(192,57,43,0.1); color: var(--red); border: 1px solid rgba(192,57,43,0.3); padding: 8px 12px; border-radius: 4px; font-family: 'Noto Sans KR', sans-serif; font-size: 0.8rem; cursor: pointer; }
.btn-new { background: rgba(74,123,196,0.1); color: #4a7bc4; border: 1px solid rgba(74,123,196,0.3); padding: 8px 12px; border-radius: 4px; font-family: 'Noto Sans KR', sans-serif; font-size: 0.8rem; cursor: pointer; }
.detail-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--muted); font-size: 0.82rem; text-align: center; gap: 8px; padding: 30px; }
.detail-empty-icon { font-size: 2rem; opacity: 0.4; }
.inline-paste-area { display: flex; flex-direction: column; gap: 10px; }
.inline-paste-area textarea { min-height: 120px; font-size: 0.75rem; }
.schedule-table-wrap { background: var(--paper); margin: 0 20px; border-radius: 0 0 8px 8px; overflow: hidden; box-shadow: 0 8px 24px var(--shadow); margin-bottom: 20px; }
.schedule-table-header { background: var(--ink); padding: 10px 18px; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid rgba(201,168,76,0.2); }
.schedule-table-title { font-family: 'Noto Serif KR', serif; color: var(--gold); font-size: 0.9rem; font-weight: 700; }
.schedule-table-wrap table { width: 100%; border-collapse: collapse; font-size: 0.73rem; }
.schedule-table-wrap th { background: var(--ink-light); color: rgba(255,255,255,0.75); padding: 7px 8px; text-align: center; font-weight: 600; white-space: nowrap; border-right: 1px solid rgba(255,255,255,0.07); }
.schedule-table-wrap td { padding: 6px 8px; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); text-align: center; vertical-align: middle; color: var(--ink); }
.schedule-table-wrap tr:hover td { background: #f5f0e4; cursor: pointer; }
.badge { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 0.68rem; font-weight: 700; }
.badge-변론 { background: rgba(192,57,43,0.12); color: #c0392b; }
.badge-조정 { background: rgba(41,128,185,0.12); color: #2980b9; }
.badge-선고 { background: rgba(142,68,173,0.12); color: #8e44ad; }
.badge-기타 { background: rgba(39,174,96,0.12); color: #27ae60; }
.badge-위임Y { background: rgba(39,174,96,0.12); color: #27ae60; }
.badge-위임N { background: rgba(192,57,43,0.1); color: #c0392b; }
.empty-row td { color: var(--muted); font-style: italic; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(10,10,30,0.7); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
.modal-overlay.show { display: flex; }
.modal-box { background: var(--paper); border-radius: 10px; padding: 24px; min-width: 320px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); border: 1px solid var(--border); }
.modal-title { font-family: 'Noto Serif KR', serif; font-size: 1.1rem; font-weight: 700; color: var(--ink); margin-bottom: 18px; text-align: center; }
.picker-row { display: flex; gap: 14px; margin-bottom: 16px; }
.picker-col { flex: 1; }
.picker-col label { font-size: 0.75rem; font-weight: 700; color: var(--muted); display: block; margin-bottom: 5px; }
.picker-col select { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 0.9rem; background: white; }
.modal-actions { display: flex; gap: 10px; }
.btn-confirm { flex: 1; background: var(--gold); color: var(--ink); border: none; padding: 10px; border-radius: 4px; font-weight: 700; font-size: 0.85rem; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }
.btn-cancel { flex: 1; background: var(--paper-dark); color: var(--muted); border: 1px solid var(--border); padding: 10px; border-radius: 4px; font-weight: 700; font-size: 0.85rem; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }
.dday-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(10,10,30,0.85); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(6px); }
.dday-modal-overlay.show { display: flex; }
.dday-box { background: var(--paper); border-radius: 12px; padding: 28px 30px 22px; min-width: 420px; max-width: 560px; max-height: 80vh; overflow-y: auto; box-shadow: 0 24px 72px rgba(0,0,0,0.6); border: 2px solid var(--gold); }
.dday-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.dday-icon { font-size: 2rem; }
.dday-head-text h2 { font-family: 'Noto Serif KR', serif; font-size: 1.25rem; font-weight: 700; color: var(--ink); }
.dday-head-text p { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
.dday-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.dday-item { display: flex; align-items: center; gap: 12px; background: var(--paper-dark); border-radius: 8px; padding: 12px 14px; border-left: 4px solid var(--gold); }
.dday-item.urgent { border-left-color: var(--red); }
.dday-item.warning { border-left-color: #e67e22; }
.dday-badge { font-size: 0.75rem; font-weight: 700; min-width: 52px; text-align: center; padding: 3px 8px; border-radius: 12px; background: var(--ink); color: var(--gold); }
.dday-item.urgent .dday-badge { background: var(--red); color: white; }
.dday-item.warning .dday-badge { background: #e67e22; color: white; }
.dday-item-info { flex: 1; }
.dday-item-title { font-size: 0.85rem; font-weight: 700; color: var(--ink); }
.dday-item-desc { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
.dday-close { width: 100%; background: var(--gold); color: var(--ink); border: none; padding: 11px; border-radius: 6px; font-weight: 700; font-size: 0.88rem; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }
.dday-none { text-align: center; color: var(--muted); padding: 20px 0; font-size: 0.85rem; }
.section-divider { border: none; border-top: 1px solid var(--border); margin: 6px 0 10px; }
.mobile-detail-overlay { display: none; position: fixed; inset: 0; background: rgba(10,10,30,0.6); z-index: 500; }
.mobile-detail-sheet { position: fixed; bottom: 0; left: 0; right: 0; background: var(--paper-dark); border-radius: 16px 16px 0 0; max-height: 88vh; overflow-y: auto; z-index: 501; transform: translateY(100%); transition: transform 0.3s ease; }
.mobile-detail-sheet.open { transform: translateY(0); }
.mobile-sheet-handle { width: 40px; height: 4px; background: var(--border-dark); border-radius: 2px; margin: 12px auto 0; }
.mobile-fab { display: none; position: fixed; bottom: 72px; right: 20px; width: 52px; height: 52px; background: var(--gold); border-radius: 50%; border: none; font-size: 1.5rem; cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.3); z-index: 400; align-items: center; justify-content: center; color: var(--ink); font-weight: 700; }
.mobile-bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--ink); border-top: 1px solid rgba(201,168,76,0.3); padding: 8px 0; z-index: 300; justify-content: space-around; }
.mobile-nav-btn { background: none; border: none; color: rgba(255,255,255,0.5); font-size: 0.65rem; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 4px 8px; font-family: 'Noto Sans KR', sans-serif; }
.mobile-nav-btn .nav-icon { font-size: 1.2rem; }
.mobile-nav-btn.active { color: var(--gold); }
@media (max-width: 768px) {
  .app-header { padding: 10px 14px; }
  .app-logo { font-size: 1rem; }
  .app-logo span { display: none; }
  .header-actions { display: none; }
  .main-area { padding: 8px 8px 0; flex-direction: column; }
  .calendar-panel { border-radius: 8px; }
  .detail-panel { display: none; }
  .cal-cell { min-height: 64px; padding: 3px; }
  .cell-event { font-size: 0.6rem; }
  .schedule-table-wrap { margin: 6px 8px 70px; border-radius: 8px; }
  .schedule-table-wrap table { font-size: 0.65rem; }
  .schedule-table-wrap th, .schedule-table-wrap td { padding: 5px; }
  .mobile-detail-overlay { display: block; }
  .mobile-fab { display: flex; }
  .mobile-bottom-nav { display: flex; }
  .modal-box { min-width: 90vw !important; max-width: 95vw !important; }
  .dday-box { min-width: 90vw !important; max-width: 95vw !important; }
}
</style>
</head>
<body>
<div class="app-wrapper">
  <div class="app-header">
    <div class="app-logo">⚖ 재판 일정 관리 <span>Court Calendar</span></div>
    <div id="syncStatus" style="font-size:0.75rem;color:rgba(255,255,255,0.4);">● 연결 중...</div>
    <div id="lastModified" style="font-size:0.72rem;color:rgba(255,255,255,0.35);"></div>
    <div class="header-actions">
      <button class="btn-add" style="background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.15);" onclick="backupData()">💾 백업</button>
      <button class="btn-add" style="background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.15);" onclick="document.getElementById('restoreInput').click()">📂 복원</button>
      <input type="file" id="restoreInput" accept=".json" style="display:none" onchange="restoreData(event)">
      <button class="btn-add" onclick="openDDayModal()">⚠️ D-Day 알림</button>
      <button class="btn-add" onclick="openNewEvent()">+ 새 일정</button>
    </div>
  </div>
  <div class="main-area">
    <div class="calendar-panel">
      <div class="cal-header">
        <div class="cal-title" onclick="openDatePicker()">
          <span id="calTitleText">2026년 4월</span>
          <span style="font-size:1rem;opacity:0.7;">▾</span>
        </div>
        <div class="cal-nav">
          <button class="cal-nav-btn" onclick="changeMonth(-1)">&#8592;</button>
          <button class="cal-nav-btn" onclick="goToday()">오늘</button>
          <button class="cal-nav-btn" onclick="changeMonth(1)">&#8594;</button>
        </div>
      </div>
      <div class="cal-weekdays">
        <div class="cal-weekday">일</div><div class="cal-weekday">월</div>
        <div class="cal-weekday">화</div><div class="cal-weekday">수</div>
        <div class="cal-weekday">목</div><div class="cal-weekday">금</div>
        <div class="cal-weekday">토</div>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
    <div class="detail-panel">
      <div class="detail-header">
        <div class="detail-title">일정 상세</div>
        <div class="detail-date-label" id="detailDateLabel">날짜를 선택하세요</div>
      </div>
      <div class="detail-tabs" id="detailTabs" style="display:none;">
        <div class="detail-tab active" id="tabDetail" onclick="switchTab('detail')">📋 일정</div>
        <div class="detail-tab" id="tabPaste" onclick="switchTab('paste')">📥 붙여넣기</div>
      </div>
      <div class="detail-body" id="detailBody">
        <div class="detail-empty"><div class="detail-empty-icon">📅</div><div>달력에서 날짜를 클릭하세요</div></div>
      </div>
      <div class="detail-actions" id="detailActions" style="display:none;">
        <button class="btn-new" onclick="openNewEvent()">+ 새 일정</button>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzxOmZHCK_bFRwiMExLf9Cs4RyiLEKyUvhrpVki_MjOjlzGDRvB1UduWfqdb8vf44KGcA/exec';
const OUR_KEYWORDS = ['굿리치','리치앤코','리치플래너컨설팅'];

function isOurs(name){ return OUR_KEYWORDS.some(k=>(name||'').includes(k)); }
function getOpponent(ev){
  if(isOurs(ev.plaintiff)) return ev.defendant||ev.plaintiff||'';
  if(isOurs(ev.defendant)) return ev.plaintiff||ev.defendant||'';
  return ev.plaintiff||ev.defendant||'';
}
// 시간 문자열 정규화 (구글 시트 Date 객체 대응)
function normalizeTime(val){
  if(!val) return '';
  const s = String(val);
  // 이미 HH:mm 형식이면 그대로
  if(/^\d{1,2}:\d{2}$/.test(s.trim())) return s.trim();
  // Date 문자열 형태 (Sat Dec 30 1899 ...) 파싱
  try {
    const d = new Date(val);
    if(!isNaN(d)) return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  } catch(e){}
  return s;
}
// 날짜 문자열 정규화
function normalizeDate(val){
  if(!val) return '';
  const s = String(val);
  if(/^\d{4}-\d{2}-\d{2}$/.test(s.trim())) return s.trim();
  try {
    const d = new Date(val);
    if(!isNaN(d)) return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  } catch(e){}
  return s;
}

let currentYear, currentMonth;
let events = {};
let selectedEventId = null;
let selectedDate = null;
let currentTab = 'detail';
const today = new Date();

function showSyncStatus(msg,color){ const el=document.getElementById('syncStatus'); if(el){el.textContent=msg;el.style.color=color||'rgba(255,255,255,0.5)';} }
function showLastModified(when){ const el=document.getElementById('lastModified'); if(el&&when)el.textContent='최종수정: '+when; }

// ─── Init ─────────────────────────────────────────────────
(async function init(){
  currentYear=today.getFullYear(); currentMonth=today.getMonth();
  const raw=localStorage.getItem('courtEvents');
  if(raw){
    events=JSON.parse(raw);
    const mr=localStorage.getItem('courtMeta'); if(mr)showLastModified(JSON.parse(mr).modTime);
    renderCalendar(); renderScheduleTable();
  }
  const py=document.getElementById('pickYear');
  for(let y=2020;y<=2035;y++){const o=document.createElement('option');o.value=y;o.textContent=y+'년';if(y===currentYear)o.selected=true;py.appendChild(o);}
  await loadFromStorage();
})();

// ─── JSONP 통신 ──────────────────────────────────────────
function gasJsonp(params){
  return new Promise((resolve,reject)=>{
    const cb='_gasCb_'+Date.now();
    const qs=Object.entries({...params,callback:cb}).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');
    const script=document.createElement('script');
    const timer=setTimeout(()=>{cleanup();reject(new Error('timeout'));},12000);
    window[cb]=(data)=>{cleanup();resolve(data);};
    function cleanup(){clearTimeout(timer);delete window[cb];if(script.parentNode)script.parentNode.removeChild(script);}
    script.onerror=()=>{cleanup();reject(new Error('error'));};
    script.src=GAS_URL+'?'+qs;
    document.head.appendChild(script);
  });
}

async function saveToStorage(){
  const now=new Date();
  const modTime=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  localStorage.setItem('courtEvents',JSON.stringify(events));
  localStorage.setItem('courtMeta',JSON.stringify({modTime}));
  showLastModified(modTime);
  showSyncStatus('⏳ 저장 중...','#e8c97a');
  try{
    await gasJsonp({action:'save',data:encodeURIComponent(JSON.stringify({events,_meta:{modTime}}))});
    showSyncStatus('✅ 저장됨','#7bc47b');
    setTimeout(()=>showSyncStatus('● 구글 시트 연동','rgba(255,255,255,0.4)'),2000);
  }catch(e){
    try{
      await fetch(GAS_URL+'?action=save',{method:'POST',body:JSON.stringify({events,_meta:{modTime}})});
      showSyncStatus('✅ 저장됨','#7bc47b');
      setTimeout(()=>showSyncStatus('● 구글 시트 연동','rgba(255,255,255,0.4)'),2000);
    }catch(e2){ showSyncStatus('✅ 로컬 저장됨','#7bc47b'); }
  }
}

async function loadFromStorage(){
  showSyncStatus('⏳ 불러오는 중...','#e8c97a');
  let loaded=false;
  try{
    const data=await gasJsonp({action:'load'});
    if(data&&typeof data==='object'){
      const meta=data._meta; delete data._meta;
      // 날짜/시간 정규화
      const normalized={};
      Object.entries(data).forEach(([dk,evs])=>{
        const fixedDate=normalizeDate(dk);
        if(!fixedDate)return;
        normalized[fixedDate]=(evs||[]).map(ev=>({...ev,date:normalizeDate(ev.date),time:normalizeTime(ev.time)}));
      });
      events=normalized;
      localStorage.setItem('courtEvents',JSON.stringify(events));
      if(meta){localStorage.setItem('courtMeta',JSON.stringify(meta));showLastModified(meta.modTime);}
      showSyncStatus('✅ 동기화됨','#7bc47b');
      setTimeout(()=>showSyncStatus('● 구글 시트 연동','rgba(255,255,255,0.4)'),2000);
      loaded=true;
    }
  }catch(e){
    try{
      const res=await fetch(GAS_URL+'?action=load');
      const data=await res.json();
      if(data&&typeof data==='object'){
        const meta=data._meta; delete data._meta;
        const normalized={};
        Object.entries(data).forEach(([dk,evs])=>{
          const fixedDate=normalizeDate(dk);
          if(!fixedDate)return;
          normalized[fixedDate]=(evs||[]).map(ev=>({...ev,date:normalizeDate(ev.date),time:normalizeTime(ev.time)}));
        });
        events=normalized;
        localStorage.setItem('courtEvents',JSON.stringify(events));
        if(meta){localStorage.setItem('courtMeta',JSON.stringify(meta));showLastModified(meta.modTime);}
        showSyncStatus('✅ 동기화됨','#7bc47b');
        setTimeout(()=>showSyncStatus('● 구글 시트 연동','rgba(255,255,255,0.4)'),2000);
        loaded=true;
      }
    }catch(e2){
      const raw=localStorage.getItem('courtEvents');
      if(raw)events=JSON.parse(raw); else events={};
      showSyncStatus('⚠ 오프라인 (로컬)','#e67e22');
    }
  }
  if(Object.keys(events).length===0){
    const td=fmtDate(today);
    const in5=fmtDate(new Date(today.getFullYear(),today.getMonth(),today.getDate()+5));
    addSampleEvent(td,'09:30','서울중앙지방법원','2024가합12345','민사21부','변론','민사21호법정','김철수','굿리치 주식회사','Y','홍길동 변호사','1차 변론기일','준비서면 제출 필요','deadline');
    addSampleEvent(in5,'10:30','서울고등법원','2024나54321','민사3부','변론','서관4호','굿리치 주식회사','(주)미래기업','N','본인출석','항소심 계속','상소이유서 마감 D-5','deadline');
    await saveToStorage();
  }
  renderCalendar(); renderScheduleTable();
  setTimeout(()=>openDDayModal(),400);
  setTimeout(()=>initNotifications(),1200);
}
function addSampleEvent(date,time,court,caseNo,div,type,loc,plaintiff,defendant,delegation,attendee,status,memo,flagType){
  if(!events[date])events[date]=[];
  events[date].push({id:Date.now()+Math.random(),date,time,court,caseNo,div,type,loc,plaintiff,defendant,delegation,attendee,status,memo,flagType:flagType||''});
}

// ─── 알림 (PC만) ─────────────────────────────────────────
function initNotifications(){
  if(/Mobi|Android|iPhone|iPad/i.test(navigator.userAgent))return;
  if(!('Notification'in window))return;
  if(Notification.permission==='granted')scheduleNotifications();
  else if(Notification.permission!=='denied')
    Notification.requestPermission().then(p=>{if(p==='granted'){scheduleNotifications();sendNotification('⚖ 재판 일정 관리','브라우저 알림이 활성화되었습니다.',null);}});
}
function sendNotification(title,body,tag){
  if(Notification.permission!=='granted')return;
  const n=new Notification(title,{body,tag:tag||('court-'+Date.now()),requireInteraction:true});
  n.onclick=()=>{window.focus();n.close();};
}
function scheduleNotifications(){
  if(window._notifTimers)window._notifTimers.forEach(clearTimeout);
  window._notifTimers=[];
  const now=new Date();
  for(let offset=0;offset<=2;offset++){
    const ds=fmtDate(new Date(today.getFullYear(),today.getMonth(),today.getDate()+offset));
    (events[ds]||[]).forEach(ev=>{
      if(!ev.time)return;
      const[h,m]=ev.time.split(':').map(Number);
      const evDate=new Date(ds); evDate.setHours(h,m,0,0);
      [[2,'(2일 전)'],[1,'(1일 전)']].forEach(([days,label])=>{
        const t=new Date(evDate.getFullYear(),evDate.getMonth(),evDate.getDate()-days,9,0,0);
        const ms=t-now;
        if(ms>0&&ms<72*60*60*1000)window._notifTimers.push(setTimeout(()=>sendNotification('⚖ 재판 기일 알림 '+label,ev.time+' · '+getOpponent(ev)+' '+(ev.type||'')+'\n'+(ev.court||'')+' '+(ev.caseNo||''),'ev-'+ev.id+label),ms));
      });
    });
  }
  const m9=new Date(now.getFullYear(),now.getMonth(),now.getDate(),9,0,0);
  if(now<m9)window._notifTimers.push(setTimeout(sendDailyDDayNotif,m9-now));
}
function sendDailyDDayNotif(){
  const urgent=[];
  Object.entries(events).forEach(([dk,evs])=>{const diff=Math.ceil((new Date(dk)-today)/86400000);if(diff>=0&&diff<=3)evs.forEach(ev=>urgent.push({...ev,diff}));});
  if(urgent.length>0){urgent.sort((a,b)=>a.diff-b.diff);const top=urgent[0];sendNotification('⚖ 긴급 알림 ['+(top.diff===0?'D-Day':'D-'+top.diff)+']',getOpponent(top)+' '+(top.type||'')+' '+(top.time||'')+'\n'+(top.court||'')+(top.memo?'\n📌 '+top.memo:''),'court-daily');}
}

// ─── 달력 ────────────────────────────────────────────────
function fmtDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function renderCalendar(){
  document.getElementById('calTitleText').textContent=currentYear+'년 '+(currentMonth+1)+'월';
  document.getElementById('tableTitle').textContent='📋 '+currentYear+'년 '+(currentMonth+1)+'월 재판 일정';
  const grid=document.getElementById('calGrid'); grid.innerHTML='';
  const firstDay=new Date(currentYear,currentMonth,1).getDay();
  const daysInMonth=new Date(currentYear,currentMonth+1,0).getDate();
  const daysInPrev=new Date(currentYear,currentMonth,0).getDate();
  let cells=[];
  for(let i=firstDay-1;i>=0;i--)cells.push({d:daysInPrev-i,month:currentMonth-1,year:currentYear,other:true});
  for(let d=1;d<=daysInMonth;d++)cells.push({d,month:currentMonth,year:currentYear,other:false});
  let next=1; while(cells.length%7!==0)cells.push({d:next++,month:currentMonth+1,year:currentYear,other:true});
  cells.forEach(c=>{
    const dateStr=fmtDate(new Date(c.year,c.month,c.d));
    const cell=document.createElement('div');
    cell.className='cal-cell'+(c.other?' other-month':'');
    cell.dataset.dow=new Date(c.year,c.month,c.d).getDay();
    cell.dataset.date=dateStr;
    if(!c.other&&fmtDate(today)===dateStr)cell.classList.add('today');
    if(!c.other&&new Date(c.year,c.month,c.d)<new Date(today.getFullYear(),today.getMonth(),today.getDate()))cell.classList.add('past-day');
    cell.innerHTML='<div class="day-num">'+c.d+'</div><div class="cell-events" id="cell-'+dateStr+'"></div>';
    cell.addEventListener('click',e=>{if(!e.target.classList.contains('cell-event')&&!e.target.classList.contains('cell-more'))selectDate(dateStr);});
    grid.appendChild(cell);
    renderCellEvents(dateStr);
  });
}
function renderCellEvents(dateStr){
  const container=document.getElementById('cell-'+dateStr); if(!container)return;
  container.innerHTML='';
  const dayEvents=(events[dateStr]||[]).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  const max=5;
  const isPast=new Date(dateStr)<new Date(today.getFullYear(),today.getMonth(),today.getDate());
  dayEvents.slice(0,max).forEach(ev=>{
    const div=document.createElement('div');
    div.className='cell-event type-'+(ev.type||'기타')+(isPast?' past':'');
    const opName=getOpponent(ev);
    div.title=[ev.time,opName,ev.type].filter(Boolean).join(' ');
    div.textContent=(ev.time?ev.time+' ':'')+opName;
    div.addEventListener('click',e=>{e.stopPropagation();openEventDetail(ev.id,dateStr);});
    container.appendChild(div);
  });
  if(dayEvents.length>max){
    const more=document.createElement('div');
    more.className='cell-more'; more.textContent='+'+(dayEvents.length-max)+'개 더';
    more.addEventListener('click',e=>{e.stopPropagation();selectDate(dateStr);});
    container.appendChild(more);
  }
}

// ─── 네비게이션 ──────────────────────────────────────────
function changeMonth(d){currentMonth+=d;if(currentMonth>11){currentMonth=0;currentYear++;}if(currentMonth<0){currentMonth=11;currentYear--;}renderCalendar();renderScheduleTable();}
function goToday(){currentYear=today.getFullYear();currentMonth=today.getMonth();renderCalendar();renderScheduleTable();}
function openDatePicker(){document.getElementById('pickYear').value=currentYear;document.getElementById('pickMonth').value=currentMonth;document.getElementById('datePickerModal').classList.add('show');}
function closeDatePicker(){document.getElementById('datePickerModal').classList.remove('show');}
function confirmDatePick(){currentYear=parseInt(document.getElementById('pickYear').value);currentMonth=parseInt(document.getElementById('pickMonth').value);renderCalendar();renderScheduleTable();closeDatePicker();}

// ─── 탭 전환 ─────────────────────────────────────────────
function switchTab(tab){
  currentTab=tab;
  document.getElementById('tabDetail').classList.toggle('active',tab==='detail');
  document.getElementById('tabPaste').classList.toggle('active',tab==='paste');
  if(tab==='detail')showDetailContent();
  else showPasteContent('detailBody','detailActions');
}
function switchMobileTab(tab){
  currentTab=tab;
  document.querySelectorAll('#mobileDetailTabs .detail-tab').forEach((el,i)=>el.classList.toggle('active',(i===0&&tab==='detail')||(i===1&&tab==='paste')));
  if(tab==='detail')syncMobileDetail();
  else showPasteContent('mobileDetailBody','mobileDetailActions');
}
function showDetailContent(){
  if(selectedEventId){
    const ev=(events[selectedDate]||[]).find(e=>e.id===selectedEventId);
    if(ev)showDetailForm(ev,selectedDate); else showDetailForm(null,selectedDate);
  } else showDetailForm(null,selectedDate||fmtDate(today));
}
function showPasteContent(bodyId,actionsId){
  const dateStr=selectedDate||fmtDate(today);
  const body=document.getElementById(bodyId);
  const actions=document.getElementById(actionsId);
  if(actions)actions.innerHTML='';
  const uid=bodyId==='detailBody'?'inline':'mobile';
  body.innerHTML=`
    <div class="inline-paste-area">
      <div class="form-group">
        <label class="form-label">기일 날짜</label>
        <input type="date" class="form-control" id="${uid}PasteDate" value="${dateStr}" style="max-width:180px;">
      </div>
      <div class="form-group">
        <label class="form-label">법원 시스템에서 복사 후 붙여넣기</label>
        <textarea class="form-control" id="${uid}PasteText" rows="7" placeholder="법원   사건번호   재판부   기일종류   기일시간   기일장소   원고   피고"></textarea>
      </div>
      <div id="${uid}PastePreview" style="display:none;margin-bottom:8px;">
        <div class="form-label" style="margin-bottom:4px;">미리보기</div>
        <div id="${uid}PastePreviewContent" style="font-size:0.72rem;background:var(--paper-dark);border-radius:6px;padding:8px;max-height:130px;overflow-y:auto;border:1px solid var(--border);"></div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn-new" onclick="pastePreview('${uid}')" style="flex:1;">미리보기</button>
        <button class="btn-save" id="${uid}ImportBtn" onclick="pasteImport('${uid}')" style="flex:1;display:none;">✅ 가져오기</button>
      </div>
    </div>`;
}

const parsedRowsMap={};
function pastePreview(uid){
  const text=document.getElementById(uid+'PasteText').value; if(!text.trim()){alert('내용을 붙여넣어 주세요.');return;}
  parsedRowsMap[uid]=parseCourt(text); if(!parsedRowsMap[uid].length){alert('파싱된 일정이 없습니다.');return;}
  document.getElementById(uid+'PastePreviewContent').innerHTML=parsedRowsMap[uid].map((r,i)=>`<div style="padding:3px 0;border-bottom:1px solid var(--border);display:flex;gap:6px;align-items:center;flex-wrap:wrap"><b>${i+1}</b><b>${r.time||'-'}</b><span style="color:#2980b9">${r.court}</span><span style="font-size:0.68rem">${r.caseNo}</span><span class="badge badge-${r.type}">${r.type}</span><span>${r.plaintiff} vs ${r.defendant}</span></div>`).join('');
  document.getElementById(uid+'PastePreview').style.display='block';
  document.getElementById(uid+'ImportBtn').style.display='block';
}
async function pasteImport(uid){
  const dateStr=document.getElementById(uid+'PasteDate').value; if(!dateStr){alert('날짜를 입력해 주세요.');return;}
  const rows=parsedRowsMap[uid]||[]; if(!rows.length){alert('먼저 미리보기를 눌러주세요.');return;}
  let added=0;
  rows.forEach(r=>{
    if(!events[dateStr])events[dateStr]=[];
    const dup=events[dateStr].find(e=>e.caseNo===r.caseNo&&e.time===r.time);
    if(!dup){events[dateStr].push({id:Date.now()+Math.random(),date:dateStr,...r,delegation:'Y',attendee:'',status:'',memo:'',flagType:''});added++;}
  });
  await saveToStorage(); renderCalendar(); renderScheduleTable();
  alert('✅ '+added+'개 일정을 가져왔습니다!');
  parsedRowsMap[uid]=[];
  switchTab('detail');
  if(uid==='mobile')closeMobileSheet();
}

// ─── 일정 상세 폼 ────────────────────────────────────────
function selectDate(dateStr){
  selectedDate=dateStr;
  document.querySelectorAll('.cal-cell').forEach(c=>c.classList.remove('selected'));
  const cell=document.querySelector('[data-date="'+dateStr+'"]'); if(cell)cell.classList.add('selected');
  document.getElementById('detailTabs').style.display='flex';
  document.getElementById('mobileDetailTabs').style.display='flex';
  const d=new Date(dateStr);
  document.getElementById('detailDateLabel').textContent=(d.getMonth()+1)+'월 '+d.getDate()+'일';
  currentTab='detail';
  document.getElementById('tabDetail').classList.add('active');
  document.getElementById('tabPaste').classList.remove('active');
  const dayEvents=events[dateStr]||[];
  if(dayEvents.length>0)openEventDetail(dayEvents[0].id,dateStr);
  else openNewEventOnDate(dateStr);
}
function openEventDetail(evId,dateStr){
  selectedDate=dateStr||selectedDate; selectedEventId=evId;
  document.querySelectorAll('.cal-cell').forEach(c=>c.classList.remove('selected'));
  const cell=document.querySelector('[data-date="'+(dateStr||selectedDate)+'"]'); if(cell)cell.classList.add('selected');
  const ev=(events[dateStr||selectedDate]||[]).find(e=>e.id===evId); if(!ev)return;
  currentTab='detail';
  showDetailForm(ev,dateStr||selectedDate);
}
function openNewEvent(){selectedEventId=null;currentTab='detail';showDetailForm(null,selectedDate||fmtDate(today));}
function openNewEventOnDate(dateStr){selectedEventId=null;currentTab='detail';showDetailForm(null,dateStr);}
function showDetailForm(ev,dateStr){
  if(!dateStr)dateStr=fmtDate(today);
  const d=new Date(dateStr);
  document.getElementById('detailDateLabel').textContent=(d.getMonth()+1)+'월 '+d.getDate()+'일';
  const body=document.getElementById('detailBody');
  const fields=[
    ['date','기일','date',dateStr||''],['time','기일시간','time',ev?ev.time:''],
    ['court','법원명','text',ev?ev.court:''],['caseNo','사건번호','text',ev?ev.caseNo:''],
    ['div','재판부','text',ev?ev.div:''],['type','종류','select',ev?ev.type:'변론',['변론','조정','선고','기타']],
    ['loc','기일장소','text',ev?ev.loc:''],['plaintiff','원고','text',ev?ev.plaintiff:''],
    ['defendant','피고','text',ev?ev.defendant:''],['delegation','위임여부','select',ev?ev.delegation:'Y',['Y','N']],
    ['attendee','출석자','text',ev?ev.attendee:''],['status','진행상황','text',ev?ev.status:''],
    ['memo','메모(서면제출기한/마감일 등)','textarea',ev?ev.memo:''],
    ['flagType','알림구분','select',ev?ev.flagType:'',['','deadline','alert']],
  ];
  let html='';
  const dayEvs=events[dateStr]||[];
  if(dayEvs.length>1){
    html='<div style="margin-bottom:10px;"><div class="form-label">이 날의 다른 일정</div>';
    dayEvs.forEach(e=>{
      const isA=e.id===(ev?ev.id:null);
      const opName=getOpponent(e);
      html+='<div style="display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:4px;cursor:pointer;background:'+(isA?'rgba(201,168,76,0.15)':'transparent')+'" onclick="openEventDetail('+JSON.stringify(e.id)+',\''+dateStr+'\')">';
      html+='<span style="font-size:0.7rem;color:var(--muted)">'+(e.time||'--:--')+'</span>';
      html+='<span style="font-size:0.77rem;font-weight:'+(isA?'700':'400')+'">'+escHtml(opName)+'</span>';
      html+='<span class="badge badge-'+(e.type||'기타')+'" style="margin-left:auto">'+(e.type||'기타')+'</span></div>';
    });
    html+='</div><hr class="section-divider">';
  }
  fields.forEach(([name,label,type,val,opts])=>{
    html+='<div class="form-group"><label class="form-label">'+label+'</label>';
    if(type==='select'){html+='<select class="form-control" id="f_'+name+'">';opts.forEach(o=>html+='<option value="'+o+'"'+(val===o?' selected':'')+'>'+o+'</option>');html+='</select>';}
    else if(type==='textarea')html+='<textarea class="form-control" id="f_'+name+'" rows="3">'+escHtml(val)+'</textarea>';
    else html+='<input class="form-control" type="'+type+'" id="f_'+name+'" value="'+escHtml(val)+'">';
    html+='</div>';
  });
  body.innerHTML=html;
  document.getElementById('detailActions').style.display='flex';
  const df=document.getElementById('f_date'); if(df)df.addEventListener('change',e=>{selectedDate=e.target.value;});
  if(window.innerWidth<=768){syncMobileDetail();openMobileSheet();}
}
function escHtml(str){if(!str)return'';return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
async function saveEvent(){
  const get=id=>{const el=document.getElementById('f_'+id);return el?el.value:'';};
  const dateStr=get('date')||selectedDate; if(!dateStr){alert('날짜를 입력하세요.');return;}
  const ev={id:selectedEventId||(Date.now()+Math.random()),date:dateStr,time:get('time'),court:get('court'),caseNo:get('caseNo'),div:get('div'),type:get('type'),loc:get('loc'),plaintiff:get('plaintiff'),defendant:get('defendant'),delegation:get('delegation'),attendee:get('attendee'),status:get('status'),memo:get('memo'),flagType:get('flagType')};
  if(selectedEventId){Object.keys(events).forEach(dk=>{events[dk]=events[dk].filter(e=>e.id!==selectedEventId);if(events[dk].length===0)delete events[dk];});}
  if(!events[dateStr])events[dateStr]=[];
  events[dateStr].push(ev); selectedEventId=ev.id; selectedDate=dateStr;
  await saveToStorage(); scheduleNotifications(); renderCalendar(); renderScheduleTable(); openEventDetail(ev.id,dateStr);
}
async function deleteEvent(){
  if(!selectedEventId)return; if(!confirm('이 일정을 삭제하시겠습니까?'))return;
  Object.keys(events).forEach(dk=>{events[dk]=events[dk].filter(e=>e.id!==selectedEventId);if(events[dk].length===0)delete events[dk];});
  selectedEventId=null; await saveToStorage(); renderCalendar(); renderScheduleTable();
  document.getElementById('detailBody').innerHTML='<div class="detail-empty"><div class="detail-empty-icon">📅</div><div>일정이 삭제되었습니다</div></div>';
  document.getElementById('detailActions').style.display='none';
}

// ─── 하단 테이블 ─────────────────────────────────────────
function renderScheduleTable(){
  const tbody=document.getElementById('scheduleBody'); tbody.innerHTML='';
  const all=[];
  Object.entries(events).forEach(([dk,evs])=>{const d=new Date(dk);if(d.getFullYear()===currentYear&&d.getMonth()===currentMonth)evs.forEach(ev=>all.push({...ev,_d:d}));});
  all.sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
  if(all.length===0){tbody.innerHTML='<tr class="empty-row"><td colspan="12">이번 달 등록된 일정이 없습니다</td></tr>';return;}
  all.forEach(ev=>{
    const tr=document.createElement('tr'); const d=new Date(ev.date);
    tr.innerHTML=`<td>${d.getMonth()+1}/${d.getDate()} (${['일','월','화','수','목','금','토'][d.getDay()]})</td><td>${escHtml(ev.time)||'-'}</td><td>${escHtml(ev.court)||'-'}</td><td style="font-size:0.68rem">${escHtml(ev.caseNo)||'-'}</td><td>${escHtml(ev.div)||'-'}</td><td><span class="badge badge-${ev.type||'기타'}">${ev.type||'-'}</span></td><td>${escHtml(ev.loc)||'-'}</td><td>${escHtml(ev.plaintiff)||'-'}</td><td>${escHtml(ev.defendant)||'-'}</td><td><span class="badge badge-위임${ev.delegation||'N'}">${ev.delegation||'-'}</span></td><td>${escHtml(ev.attendee)||'-'}</td><td style="font-size:0.7rem">${escHtml(ev.status)||'-'}</td>`;
    tr.addEventListener('click',()=>{currentYear=d.getFullYear();currentMonth=d.getMonth();renderCalendar();setTimeout(()=>openEventDetail(ev.id,ev.date),50);});
    tbody.appendChild(tr);
  });
}

// ─── D-Day ───────────────────────────────────────────────
function openDDayModal(){
  document.getElementById('ddayDateInfo').textContent='오늘: '+(today.getMonth()+1)+'월 '+today.getDate()+'일 ('+['일','월','화','수','목','금','토'][today.getDay()]+')';
  const list=document.getElementById('ddayList'); list.innerHTML='';
  const upcoming=[];
  Object.entries(events).forEach(([dk,evs])=>{
    const d=new Date(dk); const diff=Math.ceil((d-today)/86400000);
    if(diff>=-1&&diff<=30)evs.forEach(ev=>{if(ev.flagType==='deadline'||ev.flagType==='alert'||(ev.memo&&ev.memo.trim()))upcoming.push({...ev,diff,_d:d});});
  });
  Object.entries(events).forEach(([dk,evs])=>{
    const d=new Date(dk); const diff=Math.ceil((d-today)/86400000);
    if(diff>=0&&diff<=7)evs.forEach(ev=>{if(!upcoming.find(u=>u.id===ev.id))upcoming.push({...ev,diff,_d:d});});
  });
  upcoming.sort((a,b)=>a.diff-b.diff);
  if(upcoming.length===0)list.innerHTML='<div class="dday-none">향후 30일 이내 특이 알림 일정이 없습니다</div>';
  else upcoming.forEach(ev=>{
    const item=document.createElement('div');
    item.className='dday-item'+(ev.diff<=2?' urgent':ev.diff<=7?' warning':'');
    const ddayText=ev.diff===0?'D-Day':ev.diff<0?'D+'+Math.abs(ev.diff):'D-'+ev.diff;
    const opName=getOpponent(ev);
    item.innerHTML=`<div class="dday-badge">${ddayText}</div><div class="dday-item-info"><div class="dday-item-title">${escHtml(opName)} ${escHtml(ev.type||'')} ${ev.time?'('+ev.time+')':''}</div><div class="dday-item-desc">${ev._d.getMonth()+1}/${ev._d.getDate()} · ${escHtml(ev.court||'')} ${escHtml(ev.caseNo||'')}</div>${ev.memo?'<div class="dday-item-desc" style="color:#c0392b;margin-top:3px">📌 '+escHtml(ev.memo)+'</div>':''}</div>`;
    list.appendChild(item);
  });
  document.getElementById('ddayModal').classList.add('show');
}
function closeDDayModal(){document.getElementById('ddayModal').classList.remove('show');}

// ─── 모바일 시트 ─────────────────────────────────────────
function openMobileSheet(){
  if(window.innerWidth>768)return;
  document.getElementById('mobileOverlay').style.display='block';
  setTimeout(()=>document.getElementById('mobileSheet').classList.add('open'),10);
}
function closeMobileSheet(){
  document.getElementById('mobileSheet').classList.remove('open');
  document.getElementById('mobileOverlay').style.display='none';
}
function syncMobileDetail(){
  const body=document.getElementById('mobileDetailBody');
  const src=document.getElementById('detailBody');
  if(src)body.innerHTML=src.innerHTML;
  const actions=document.getElementById('mobileDetailActions');
  if(actions)actions.innerHTML=selectedEventId?'<button class="btn-save" style="flex:1;" onclick="saveMobileEvent()">저장</button><button class="btn-delete" onclick="deleteMobileEvent()">삭제</button>':'';
}
function saveMobileEvent(){saveEvent();closeMobileSheet();}
function deleteMobileEvent(){deleteEvent();closeMobileSheet();}
function scrollToCalendar(){window.scrollTo({top:0,behavior:'smooth'});}
function scrollToTable(){document.querySelector('.schedule-table-wrap').scrollIntoView({behavior:'smooth'});}

// ─── 백업 / 복원 ─────────────────────────────────────────
function backupData(){
  const blob=new Blob([JSON.stringify(events,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  const now=new Date(); a.download='재판일정_백업_'+now.getFullYear()+String(now.getMonth()+1).padStart(2,'0')+String(now.getDate()).padStart(2,'0')+'.json';
  a.click(); URL.revokeObjectURL(a.href);
}
function restoreData(e){
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){try{const data=JSON.parse(ev.target.result);if(confirm('백업 파일을 불러오면 현재 데이터가 덮어씌워집니다.\n계속하시겠습니까?')){events=data;saveToStorage();renderCalendar();renderScheduleTable();alert('✅ 복원 완료!');}}catch(err){alert('올바른 백업 파일이 아닙니다.');}};
  reader.readAsText(file); e.target.value='';
}

// ─── 법원 붙여넣기 파싱 ──────────────────────────────────
function parseCourt(text){
  const lines=text.trim().split('\n').map(l=>l.trim()).filter(Boolean);
  const hk=['법원','사건번호','재판부','기일종류','기일시간','기일장소','원고','피고'];
  const rows=[];
  lines.forEach(line=>{
    const cols=line.split('\t').map(c=>c.trim()); if(cols.length<4)return;
    if(hk.filter(k=>cols.join('').includes(k)).length>=3)return;
    const typeRaw=cols[3]||''; let type='기타';
    if(typeRaw.includes('변론'))type='변론'; else if(typeRaw.includes('조정'))type='조정'; else if(typeRaw.includes('선고'))type='선고';
    rows.push({court:cols[0]||'',caseNo:cols[1]||'',div:cols[2]||'',type,time:(cols[4]||'').replace(/[^0-9:]/g,'').substring(0,5),loc:cols[5]||'',plaintiff:cols[6]||'',defendant:cols[7]||''});
  });
  return rows;
}
